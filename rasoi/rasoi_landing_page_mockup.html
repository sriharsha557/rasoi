
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .frame {
    background: var(--color-background-secondary);
    border-radius: 20px;
    padding: 12px;
    width: 100%;
  }
  .card {
    background: var(--color-background-primary);
    border-radius: 14px;
    border: 0.5px solid var(--color-border-tertiary);
    display: grid;
    grid-template-columns: 44% 56%;
    min-height: 400px;
    overflow: hidden;
  }
  .photo-side {
    background: #c97a3a;
    border-radius: 12px 0 0 12px;
    overflow: hidden;
    position: relative;
    min-height: 380px;
  }
  .food-svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  .content-side {
    padding: 32px 28px 28px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .logo-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
  }
  .logo-spoon {
    width: 28px;
    height: 28px;
  }
  .logo-text {
    font-size: 18px;
    font-weight: 500;
    color: var(--color-text-primary);
    letter-spacing: -0.3px;
  }
  .logo-text span {
    color: #0F6E56;
  }
  .progress-row {
    display: flex;
    gap: 5px;
    margin-bottom: 6px;
    align-items: center;
  }
  .progress-dot {
    height: 3px;
    border-radius: 2px;
    background: var(--color-border-tertiary);
    flex: 1;
  }
  .progress-dot.active { background: #1D9E75; }
  .step-label {
    font-size: 11px;
    color: var(--color-text-tertiary);
    margin-bottom: 16px;
  }
  .headline {
    font-size: 22px;
    font-weight: 500;
    line-height: 1.25;
    color: var(--color-text-primary);
    margin-bottom: 14px;
  }
  .desc-box {
    background: var(--color-background-secondary);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13px;
    color: var(--color-text-secondary);
    line-height: 1.55;
    margin-bottom: 20px;
  }
  .action-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 20px;
  }
  .action-btn {
    border: 0.5px solid var(--color-border-secondary);
    border-radius: 10px;
    padding: 12px 10px;
    background: var(--color-background-primary);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    transition: background 0.15s;
  }
  .action-btn:hover { background: var(--color-background-secondary); }
  .action-btn i { font-size: 20px; color: #1D9E75; }
  .action-btn span {
    font-size: 12px;
    color: var(--color-text-secondary);
    text-align: center;
    line-height: 1.3;
  }
  .cta-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .btn-guest {
    border: 0.5px solid var(--color-border-secondary);
    border-radius: 50px;
    padding: 11px 20px;
    font-size: 14px;
    background: transparent;
    color: var(--color-text-secondary);
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-guest:hover { background: var(--color-background-secondary); }
  .btn-start {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #1D9E75;
    color: white;
    border: none;
    border-radius: 50px;
    padding: 11px 22px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    flex: 1;
    justify-content: center;
    transition: background 0.15s;
  }
  .btn-start:hover { background: #0F6E56; }
  .btn-start i { font-size: 16px; }
  .chammach-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 14px;
  }
  .chammach-bubble {
    background: #E1F5EE;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 11px;
    color: #085041;
    line-height: 1.4;
    flex: 1;
  }
  .chammach-icon {
    width: 32px;
    height: 32px;
    flex-shrink: 0;
  }
</style>
